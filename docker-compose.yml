version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ashram_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ashram_media_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SriChakraYogaSecurePassword2026!}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ashram_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ashram_media_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ashram_backend
    restart: always
    environment:
      PORT: 8081
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ashram_media_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-SriChakraYogaSecurePassword2026!}
      JWT_SECRET: ${JWT_SECRET:-SriChakraYogaSacredSecretKeyForJwtAuthentication2026!}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:80,https://srichakrayoga.org}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-secret_placeholder}
    volumes:
      - media_uploads:/app/uploads
      - h2_fallback_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ashram_network
    expose:
      - "8081"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ashram_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ashram_network

networks:
  ashram_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  media_uploads:
    driver: local
  h2_fallback_data:
    driver: local
